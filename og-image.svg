<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#0d0d1a"/>
      <stop offset="1" stop-color="#05050c"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a8a0a"/>
      <stop offset="1" stop-color="#39ff14"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0.35">
      <stop offset="0" stop-color="#39ff14"/>
      <stop offset="0.5" stop-color="#6cff8a"/>
      <stop offset="1" stop-color="#39ff14"/>
    </linearGradient>
    <linearGradient id="snakeGrad" x1="0.4" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#7affa0"/>
      <stop offset="0.4" stop-color="#39ff14"/>
      <stop offset="1" stop-color="#0f5f05"/>
    </linearGradient>
    <radialGradient id="headGrad" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#9cff54"/>
      <stop offset="1" stop-color="#1a8a0a"/>
    </radialGradient>
    <radialGradient id="topGlow" cx="0.3" cy="0.05" r="0.75">
      <stop offset="0" stop-color="#39ff14" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#39ff14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cornerGlow" cx="0.92" cy="0.95" r="0.55">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="accentGlow" cx="0.08" cy="1" r="0.45">
      <stop offset="0" stop-color="#4facfe" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#4facfe" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e1e3a" stroke-width="1"/>
    </pattern>
    <filter id="snakeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>
  <rect width="1200" height="630" fill="url(#topGlow)"/>
  <rect width="1200" height="630" fill="url(#cornerGlow)"/>
  <rect width="1200" height="630" fill="url(#accentGlow)"/>

  <!-- Top brand -->
  <g transform="translate(72, 64)">
    <rect width="76" height="76" rx="18" fill="url(#greenGrad)"/>
    <path d="M 50 24 Q 50 18 42 18 L 30 18 Q 22 18 22 28 Q 22 36 30 36 L 46 36 Q 54 36 54 46 Q 54 54 46 54 L 26 54"
          fill="none" stroke="#080812" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="26" cy="54" r="3.5" fill="#080812"/>
  </g>
  <text x="164" y="100" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-weight="800" font-size="32" fill="#f0f0ff">Slither Pro</text>
  <text x="164" y="128" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-weight="500" font-size="16" fill="#8a8aa5" letter-spacing="0.3">Advanced mods for Slither.io</text>

  <!-- Food particles (decorative) -->
  <g opacity="0.85">
    <circle cx="820" cy="158" r="14" fill="#ff4757" opacity="0.22"/>
    <circle cx="820" cy="158" r="5" fill="#ff4757"/>
    <circle cx="1140" cy="238" r="12" fill="#4facfe" opacity="0.22"/>
    <circle cx="1140" cy="238" r="4" fill="#4facfe"/>
    <circle cx="785" cy="368" r="13" fill="#facc15" opacity="0.22"/>
    <circle cx="785" cy="368" r="4.5" fill="#facc15"/>
    <circle cx="1168" cy="478" r="12" fill="#a855f7" opacity="0.22"/>
    <circle cx="1168" cy="478" r="4" fill="#a855f7"/>
    <circle cx="840" cy="560" r="11" fill="#f472b6" opacity="0.22"/>
    <circle cx="840" cy="560" r="3.5" fill="#f472b6"/>
  </g>

  <!-- Decorative snake - glow halo behind -->
  <path d="M 1130 105 Q 880 250 1070 400 Q 1260 550 990 700"
        fill="none" stroke="#39ff14" stroke-width="44"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#snakeGlow)" opacity="0.55"/>
  <!-- Snake body (main) -->
  <path d="M 1130 105 Q 880 250 1070 400 Q 1260 550 990 700"
        fill="none" stroke="url(#snakeGrad)" stroke-width="24"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Inner highlight stripe -->
  <path d="M 1130 105 Q 880 250 1070 400 Q 1260 550 990 700"
        fill="none" stroke="#b9ffb0" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round"
        opacity="0.35"/>

  <!-- Snake head -->
  <g>
    <circle cx="1130" cy="105" r="34" fill="#39ff14" opacity="0.35" filter="url(#snakeGlow)"/>
    <circle cx="1130" cy="105" r="28" fill="url(#headGrad)" stroke="#0f5f05" stroke-width="2"/>
    <!-- eye whites -->
    <circle cx="1119" cy="97" r="6.5" fill="#f5ffff"/>
    <circle cx="1141" cy="97" r="6.5" fill="#f5ffff"/>
    <!-- pupils -->
    <circle cx="1120" cy="98" r="3.8" fill="#080812"/>
    <circle cx="1142" cy="98" r="3.8" fill="#080812"/>
    <!-- eye highlights -->
    <circle cx="1121.5" cy="96" r="1.3" fill="#f5ffff"/>
    <circle cx="1143.5" cy="96" r="1.3" fill="#f5ffff"/>
  </g>

  <!-- Main title -->
  <text x="72" y="296" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-weight="900" font-size="94" fill="#f0f0ff" letter-spacing="-4" filter="url(#textShadow)">Dominate</text>
  <text x="72" y="402" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-weight="900" font-size="94" fill="url(#titleGrad)" letter-spacing="-4" filter="url(#textShadow)">Slither.io</text>

  <!-- Divider accent -->
  <rect x="72" y="428" width="72" height="4" rx="2" fill="url(#titleGrad)"/>

  <!-- Subtitle -->
  <text x="72" y="462" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-weight="500" font-size="22" fill="#d0d0e0">30+ Skins  ·  AI Bot  ·  Smart Zoom  ·  Live HUD  ·  Minimap</text>

  <!-- Feature badges -->
  <g transform="translate(72, 498)">
    <rect width="162" height="44" rx="22" fill="#141428" stroke="#39ff14" stroke-opacity="0.6"/>
    <text x="81" y="28" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-weight="700" font-size="13" fill="#39ff14" text-anchor="middle" letter-spacing="0.6">FREE FOREVER</text>
  </g>
  <g transform="translate(244, 498)">
    <rect width="208" height="44" rx="22" fill="#141428" stroke="#4facfe" stroke-opacity="0.6"/>
    <text x="104" y="28" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-weight="700" font-size="13" fill="#4facfe" text-anchor="middle" letter-spacing="0.6">CHROME · FIREFOX · EDGE</text>
  </g>
  <g transform="translate(462, 498)">
    <rect width="158" height="44" rx="22" fill="#141428" stroke="#a855f7" stroke-opacity="0.6"/>
    <text x="79" y="28" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-weight="700" font-size="13" fill="#a855f7" text-anchor="middle" letter-spacing="0.6">ZERO TRACKING</text>
  </g>

  <!-- URL watermark -->
  <text x="1128" y="596" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-weight="600" font-size="16" fill="#8a8aa5" text-anchor="end">slitherpro.xyz</text>
</svg>
